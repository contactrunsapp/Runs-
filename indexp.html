<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RUNS App - Cloud Android</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; padding: 10px; display: flex; justify-content: center; align-items: center; }
        
        .phone { max-width: 400px; width: 100%; margin: 0 auto; background: #1a1a2e; border-radius: 40px; padding: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .screen { background: #fff; border-radius: 35px; overflow: hidden; height: 650px; display: flex; flex-direction: column; }
        
        .status-bar { background: #000; color: white; padding: 12px 20px; display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; }
        .home-screen { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); flex: 1; padding: 20px; overflow-y: auto; }
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .app-icon { text-align: center; cursor: pointer; transition: transform 0.2s; }
        .app-icon:active { transform: scale(0.95); }
        .app-icon-img { width: 60px; height: 60px; background: rgba(255,255,255,0.15); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 32px; }
        .app-name { color: white; font-size: 11px; text-align: center; }
        
        .runs-icon { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        
        .webview-container { display: none; flex-direction: column; flex: 1; }
        .webview-header { background: #f5f5f5; padding: 10px; display: flex; gap: 10px; align-items: center; }
        .url-input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; }
        .webview-frame { flex: 1; border: none; }
        
        .nav-bar { background: rgba(0,0,0,0.9); padding: 10px 0; display: flex; justify-content: space-around; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { color: white; font-size: 24px; cursor: pointer; padding: 5px 20px; }
        
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; z-index: 1000; }
        
        @media (max-width: 480px) {
            .phone { padding: 8px; }
            .screen { height: 600px; }
            .app-icon-img { width: 50px; height: 50px; font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <div class="status-bar">
                <span id="time">12:00</span>
                <span>📶 5G 🔋 100%</span>
            </div>
            
            <div class="home-screen" id="homeScreen">
                <div class="app-grid">
                    <div class="app-icon" onclick="openChrome()">
                        <div class="app-icon-img">🌐</div>
                        <div class="app-name">Chrome</div>
                    </div>
                    <div class="app-icon" onclick="openPlayStore()">
                        <div class="app-icon-img">📦</div>
                        <div class="app-name">Play Store</div>
                    </div>
                    <div class="app-icon" onclick="openDownloads()">
                        <div class="app-icon-img">📥</div>
                        <div class="app-name">Downloads</div>
                    </div>
                    <div class="app-icon" onclick="openSettings()">
                        <div class="app-icon-img">⚙️</div>
                        <div class="app-name">Settings</div>
                    </div>
                </div>
                
                <div class="app-grid">
                    <div class="app-icon" onclick="openRUNSApp()">
                        <div class="app-icon-img runs-icon">🚀</div>
                        <div class="app-name">RUNS</div>
                    </div>
                </div>
            </div>
            
            <div class="webview-container" id="webviewContainer">
                <div class="webview-header">
                    <div class="app-back" onclick="closeWebView()" style="font-size:24px; cursor:pointer; padding:5px;">←</div>
                    <input type="text" id="urlInput" class="url-input" placeholder="Search or type URL" value="https://www.google.com">
                    <button onclick="loadUrl()" style="background:#4ecdc4; border:none; border-radius:20px; padding:8px 15px;">Go</button>
                </div>
                <iframe id="webviewFrame" class="webview-frame" src="https://www.google.com"></iframe>
            </div>
            
            <div class="nav-bar">
                <div class="nav-btn" onclick="goBack()">◀</div>
                <div class="nav-btn" onclick="goHome()">●</div>
                <div class="nav-btn" onclick="showRecent()">□</div>
            </div>
        </div>
    </div>
    
    <script>
        function updateTime() {
            document.getElementById('time').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        updateTime();
        setInterval(updateTime, 1000);
        
        function openChrome() {
            document.getElementById('homeScreen').style.display = 'none';
            document.getElementById('webviewContainer').style.display = 'flex';
        }
        
        function closeWebView() {
            document.getElementById('webviewContainer').style.display = 'none';
            document.getElementById('homeScreen').style.display = 'flex';
        }
        
        function loadUrl() {
            let url = document.getElementById('urlInput').value;
            if (!url.startsWith('http')) url = 'https://' + url;
            document.getElementById('webviewFrame').src = url;
        }
        
        function openPlayStore() {
            alert('RUNS App is already installed! Tap the 🚀 RUNS icon on home screen.');
        }
        
        function openDownloads() {
            alert('✓ RUNS.apk is installed\n\nTap the 🚀 RUNS icon on home screen to open your app.');
        }
        
        function openRUNSApp() {
            document.getElementById('homeScreen').style.display = 'none';
            document.getElementById('webviewContainer').style.display = 'flex';
            
            // ============================================
            // CHANGE THIS TO YOUR RUNS APP URL
            // If your RUNS.apk is a website/web app, put URL here
            // ============================================
            const RUNS_APP_URL = "https://runsapp_mrrplw.browserstack.com";
            // ============================================
            
            document.getElementById('urlInput').value = RUNS_APP_URL;
            document.getElementById('webviewFrame').src = RUNS_APP_URL;
            showToast('Opening RUNS App...');
        }
        
        function openSettings() {
            alert('📱 Cloud Android Emulator v2.0\n\n🚀 RUNS App: Installed\n✓ Status: Ready to use\n\nTap the RUNS icon on home screen to open your app!');
        }
        
        function goBack() {
            if (document.getElementById('webviewContainer').style.display === 'flex') {
                closeWebView();
            }
        }
        
        function goHome() {
            closeWebView();
        }
        
        function showRecent() {
            showToast('RUNS App is ready to use');
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
